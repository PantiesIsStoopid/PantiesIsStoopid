name: Test GitHub Metrics Token

on:
  workflow_dispatch:

jobs:
  test-metrics-token:
    runs-on: ubuntu-latest
    environment: ReadME  # Use the ReadME environment

    steps:
      - name: Print Metrics Token Presence
        env:
          METRICSTOKEN: ${{ secrets.METRICSTOKEN }}
        run: |
          if [ -z "$METRICSTOKEN" ]; then
            echo "Metrics token is not set."
          else
            echo "Metrics token is set: ${METRICSTOKEN::4}****"  # Show the first 4 characters only
          fi
